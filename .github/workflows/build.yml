name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-clean-1780778001-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-clean-1780778001-

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar APK Debug
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 || true
          echo "=== KAPT STUBS ERROR FILES ===" 
          find . -name "*.txt" -path "*/kapt*" -newer gradlew 2>/dev/null | head -5 | xargs cat 2>/dev/null || true
          find . -name "kapt-errors.txt" 2>/dev/null | xargs cat 2>/dev/null || true
          find build -name "*.log" 2>/dev/null | head -3 | xargs grep -l "error" 2>/dev/null | xargs cat 2>/dev/null || true
          ./gradlew assembleDebug --stacktrace

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ThermaGuard-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
