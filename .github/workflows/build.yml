name: Build APK + AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Compilar AAB Release (sin firma — para Play Store App Signing)
        run: ./gradlew bundleRelease -x lintRelease --stacktrace

      - name: Subir APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: ThermaGuard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Subir AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: ThermaGuard-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
